[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prismdoc"
version = "0.0.0"
description = "Cost-aware, schema-driven document extraction pipeline (deploy-as-microservice)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/prismdoc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
